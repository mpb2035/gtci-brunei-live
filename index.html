<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manpower Blueprint AKPI Monitoring Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a; --ink-soft:#1e293b; --paper:#f4f5f7; --line:#232b3a;
  --accent:#d7f24c; --accent-dark:#4d5c0a;
  --text-dim:#94a3b8; --text-dimmer:#64748b;
  --sidebar-w:264px; --sidebar-w-collapsed:72px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--paper); color:var(--ink); overflow:hidden;
}
.app{display:flex;height:100vh;width:100vw;}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--ink);
  display:flex; flex-direction:column; transition:width .2s ease;
  border-right:1px solid var(--line);
}
.sidebar.collapsed{width:var(--sidebar-w-collapsed);}
.sb-head{
  display:flex; align-items:center; gap:11px; padding:20px 18px; border-bottom:1px solid var(--line);
  min-height:76px;
}
.sb-mark{
  width:36px;height:36px;border-radius:10px;background:var(--accent);color:var(--accent-dark);
  display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;
  font-size:15px;flex-shrink:0;
}
.sb-title{overflow:hidden;white-space:nowrap;transition:opacity .15s ease;}
.sidebar.collapsed .sb-title{opacity:0;width:0;}
.sb-title h1{font-family:'Outfit',sans-serif;font-size:14.5px;font-weight:800;color:#fff;line-height:1.25;letter-spacing:-.2px;}
.sb-title p{font-size:10.5px;color:var(--text-dim);font-weight:600;margin-top:2px;letter-spacing:.2px;}

.sb-toggle{
  margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--text-dim);
  width:26px;height:26px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.sidebar.collapsed .sb-toggle{margin-left:0;}
.sb-toggle:hover{background:var(--ink-soft);color:#fff;}

.sb-section-label{
  font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dimmer);
  padding:18px 20px 8px;white-space:nowrap;overflow:hidden;
}
.sidebar.collapsed .sb-section-label{opacity:0;height:0;padding:0;}

.sb-nav{flex:1;overflow-y:auto;padding:4px 12px;}
.sb-item{
  display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; cursor:pointer;
  color:#cbd5e1; font-size:13.5px; font-weight:600; margin-bottom:3px; white-space:nowrap; overflow:hidden;
  border:1px solid transparent;
}
.sb-item:hover{background:var(--ink-soft); color:#fff;}
.sb-item.active{background:var(--accent); color:var(--accent-dark);}
.sb-item .sb-ico{
  width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;
}
.sb-item .sb-label{overflow:hidden;text-overflow:ellipsis;transition:opacity .15s ease;}
.sidebar.collapsed .sb-item .sb-label{opacity:0;width:0;}
.sb-item .sb-desc{display:none;}

.sb-foot{
  padding:14px 20px; border-top:1px solid var(--line); font-size:10.5px; color:var(--text-dimmer);
  white-space:nowrap; overflow:hidden;
}
.sidebar.collapsed .sb-foot{opacity:0;}

/* ── Main area ───────────────────────────────────────── */
.main{flex:1; display:flex; flex-direction:column; min-width:0; height:100vh;}
.page-frame-wrap{flex:1; position:relative; min-height:0;}
.page-frame{
  position:absolute; inset:0; width:100%; height:100%; border:none; background:#eef0f1;
  display:none;
}
.page-frame.active{display:block;}
.empty-state{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:#94a3b8; font-size:13px; flex-direction:column; gap:10px;
}
.empty-state .spinner{
  width:26px;height:26px;border-radius:50%;border:3px solid #dbe0e3;border-top-color:#334155;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

@media (max-width:820px){
  .sidebar{position:fixed; z-index:500; height:100vh;}
  .sidebar:not(.mobile-open){transform:translateX(-100%);}
  .sidebar.mobile-open{transform:translateX(0); width:min(78vw,300px);}
  .mobile-topbar{
    display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--ink); color:#fff;
    border-bottom:1px solid var(--line);
  }
  .mobile-topbar button{
    background:var(--ink-soft); border:1px solid var(--line); color:#fff; width:32px;height:32px;
    border-radius:8px; font-size:15px; cursor:pointer;
  }
  .mobile-topbar span{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;}
}
@media (min-width:821px){ .mobile-topbar{display:none;} }
.sidebar-scrim{display:none;}
@media (max-width:820px){
  .sidebar-scrim.open{display:block; position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:400;}
}
</style>
</head>
<body>

<div class="app">

  <div class="sidebar-scrim" id="scrim" onclick="closeMobileSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-mark">MB</div>
      <div class="sb-title">
        <h1>Manpower Blueprint<br>AKPI Monitoring Dashboard</h1>
        <p>Brunei Darussalam · Wawasan 2035</p>
      </div>
      <button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()" title="Collapse sidebar">◂</button>
    </div>

    <div class="sb-section-label">Modules</div>
    <nav class="sb-nav" id="sbNav">
      <div class="sb-item" data-page="gtci" onclick="navigate('gtci')">
        <span class="sb-ico">🌐</span>
        <span class="sb-label">GTCI 2025 — All 77 Indicators</span>
      </div>
      <div class="sb-item" data-page="akpi" onclick="navigate('akpi')">
        <span class="sb-ico">📈</span>
        <span class="sb-label">AKPI Monitoring (Manpower Blueprint)</span>
      </div>
    </nav>

    <div class="sb-foot">Live · Firebase-synced · gtcibn25</div>
  </aside>

  <main class="main">
    <div class="mobile-topbar">
      <button onclick="openMobileSidebar()">☰</button>
      <span id="mobileTitle">GTCI 2025</span>
    </div>
    <div class="page-frame-wrap">
      <div class="empty-state" id="emptyState"><div class="spinner"></div><div>Loading dashboard…</div></div>
      <iframe class="page-frame" id="frame-gtci" title="GTCI 2025 Dashboard"></iframe>
      <iframe class="page-frame" id="frame-akpi" title="AKPI Monitoring Dashboard"></iframe>
    </div>
  </main>

</div>

<script>
const PAGES = {
  gtci: { src: 'gtci.html', title: 'GTCI 2025' },
  akpi: { src: 'akpi.html', title: 'AKPI Monitoring' },
};
const loaded = {};
let currentPage = null;

function navigate(page){
  if (!PAGES[page]) return;
  location.hash = page;
  render(page);
  closeMobileSidebar();
}

function render(page){
  currentPage = page;
  document.getElementById('emptyState').style.display = 'none';

  // Lazy-load the iframe src only on first visit
  const frame = document.getElementById('frame-' + page);
  if (!loaded[page]){
    frame.src = PAGES[page].src;
    loaded[page] = true;
  }

  // Toggle visible frame
  Object.keys(PAGES).forEach(p => {
    document.getElementById('frame-' + p).classList.toggle('active', p === page);
  });

  // Sidebar active state
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  document.getElementById('mobileTitle').textContent = PAGES[page].title;
  document.title = PAGES[page].title + ' · Manpower Blueprint AKPI Monitoring Dashboard';
}

function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  document.getElementById('sbToggle').textContent = sb.classList.contains('collapsed') ? '▸' : '◂';
}

function openMobileSidebar(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('scrim').classList.add('open');
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('scrim').classList.remove('open');
}

// Initial route
(function init(){
  const initial = (location.hash || '').replace('#','');
  render(PAGES[initial] ? initial : 'gtci');
})();
window.addEventListener('hashchange', () => {
  const p = (location.hash || '').replace('#','');
  if (PAGES[p] && p !== currentPage) render(p);
});
</script>

</body>
</html>
