Restrictiveness Index", "Source URL": "https://www.oecd.org/investment/fdiindex.htm", "Data Year (Ref)": "2023", "Brunei-Specific Comments": "Brunei 54.68 declining = MORE restrictive FDI environment in 2025. Concern for investment", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Brunei Investment Agency (BIA)", "Policy Interventions": "Review and selectively liberalise FDI restrictions in priority sectors, streamline approvals with transparent service standards, and clarify investor rules through a single investment interface.", "Reporting Methodology": "Engage OECD technical teams to verify how Brunei's laws are coded, submit updated legal texts and explanatory notes promptly, and track whether liberalisation measures are captured in the next release.", "Pillar": "Attract"}, {"Indicator Code": "2.1.2", "Indicator Name": "Financial Globalization", "Score": "78.93", "Data Collection Year": "2022", "Definition": "The Financial Globalisation (de facto) sub-index is one of the dimensions of the KOF Globalisation Index. It provides a measure of the degree of a country's integration in global financial flows. It is made up of five variables: (1) foreign direct investment, (2) portfolio investment, (3) international debt, (4) international reserves, and (5) international income payments. The sub-index is calculated by aggregating the five (normalised) variables, where each variable has been given a specific weight based on principal components analysis (PCA).", "Source Methodology": "KOF Globalization Index: de facto sub-index measures integration in global financial flows. 5 variables (FDI, portfolio, debt, reserves, income) with PCA weighting", "Definition (Source)": "", "Primary Database": "KOF Swiss Economic Institute Globalization Index", "Source URL": "https://kof.ethz.ch/en/forecasts-and-indicators/indicators/kof-globalisation-index.html", "Data Year (Ref)": "2022", "Brunei-Specific Comments": "Brunei 78.93 declining (-6.54) = less financially integrated with global economy", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Deepen participation in regional and global financial markets through carefully sequenced liberalisation, stronger capital market instruments, and policies that attract stable external financing.", "Reporting Methodology": "Ensure complete and timely reporting of FDI, portfolio flows, reserves, debt, and income payments to IMF-aligned systems, and explain any structural breaks that could distort KOF estimates.", "Pillar": "Attract"}, {"Indicator Code": "2.1.3", "Indicator Name": "Migrant Stock", "Score": "49.5", "Data Collection Year": "2024", "Definition": "Migrant stock refers to the number of the migrant stock population as a percentage of the total population. In producing the 2024 edition of the International Migrant Stock dataset, the Population Division has prioritised revising the estimates for countries with new empirical information from population censuses or registers and relatively large numbers of international migrants, as well as for countries affected by ongoing or emergent refugee flows as documented by UNHCR.", "Source Methodology": "UN Population Division: % of total population that are international migrants. Data from census/register data with estimation for gaps", "Definition (Source)": "", "Primary Database": "UN Population Division International Migrant Stock", "Source URL": "https://www.un.org/development/desa/pd/content/international-migrant-stock", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "Brunei MAJOR decline (-29.34 from 78.84→49.50) = fewer expats. Likely reflects policy/oil downturn", "Ministry": "Ministry of Home Affairs", "Department / Agencies": "Immigration & National Registration Department", "Policy Interventions": "Maintain a balanced migration policy that supports skilled labour needs, facilitates strategic foreign talent entry, and improves retention conditions for productive migrant workers.", "Reporting Methodology": "Coordinate immigration, population, and labour statistics so migrant stock figures are consistent, and provide updated administrative counts and policy notes to the UN Population Division.", "Pillar": "Attract"}, {"Indicator Code": "2.1.4", "Indicator Name": "International Students", "Score": "15.76", "Data Collection Year": "2023", "Definition": "The number of students from abroad studying in a given country as a percentage of the total tertiary-level enrolment in that country.", "Source Methodology": "UNESCO collects tertiary inbound mobility: foreign students / total tertiary enrolment. %. Government/institution reporting", "Definition (Source)": "", "Primary Database": "UNESCO Institute for Statistics / WIPO GII", "Source URL": "https://uis.unesco.org", "Data Year (Ref)": "2023", "Brunei-Specific Comments": "Brunei 15.76 improving (+2.37) = slightly more international students", "Ministry": "Ministry of Education / Ministry of Home Affairs", "Department / Agencies": "Department of Schools / Higher Education Department / Immigration & National Registration Department", "Policy Interventions": "Attract more international students through niche programmes, competitive scholarships, stronger marketing in ASEAN, and better visa, housing, and student support arrangements.", "Reporting Methodology": "Ensure higher education institutions report inbound mobility data consistently to UNESCO, and harmonise definitions of international students across education and immigration systems.", "Pillar": "Attract"}, {"Indicator Code": "2.1.5", "Indicator Name": "Brain Gain", "Score": "66.32", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent can companies find people with the skills required to fill their vacancies by hiring foreign labour? [1 = not at all; 7 = to a great extent—attracts the best and brightest from around the world].", "Source Methodology": "WEF EOS survey: 1-7 scale on ability to find required skills by hiring foreign labour. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei 66.32 = good capacity to attract foreign skilled talent (rank 16)", "Ministry": "Ministry of Home Affairs", "Department / Agencies": "Department of Labour", "Policy Interventions": "Simplify high-skill visa pathways, build targeted global talent schemes for shortage occupations, and align immigration approvals with national skills-gap priorities.", "Reporting Methodology": "Document foreign talent schemes and employer use cases in English, and encourage firms that successfully recruit global talent to participate in perception surveys.", "Pillar": "Attract"}, {"Indicator Code": "2.1.6", "Indicator Name": "AI skills migration", "Score": "", "Data Collection Year": "2024", "Definition": "AI skills migration is derived from LinkedIn migration rates based on members' self-identified locations. Net AI talent migration between two countries is calculated as net AI talent flows divided by the AI member count in the destination country. From 2023 onwards, only AI engineering skills are considered in computing AI talent migration indicators.", "Source Methodology": "Relative migration of members with AI skills. Derived from LinkedIn user profiles showing net AI talent migration.", "Definition (Source)": "", "Primary Database": "LinkedIn Economic Graph", "Source URL": "https://economicgraph.linkedin.com", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Unknown", "Department / Agencies": "Unknown", "Policy Interventions": "Develop a visible AI ecosystem through AI-related university programmes, applied research labs, challenge funds, and incentives for firms to hire and retain AI engineers.", "Reporting Methodology": "Engage LinkedIn Economic Graph and related international partners to confirm Brunei's inclusion, encourage professionals to maintain accurate AI skill tags and location data, and share national AI talent mapping where available.", "Pillar": "Attract"}, {"Indicator Code": "2.2.1", "Indicator Name": "Tolerance of minorities", "Score": "27.66", "Data Collection Year": "2023", "Definition": "Tolerance of minorities is based on the Group Grievance indicator included in the Fragile States Index. Group Grievance focuses on divisions and schisms between different groups in society—particularly divisions based on social or political characteristics—and their role in access to services or resources, and inclusion in the political process. Its dimensions include post-conflict response, equality, divisions, and communal violence. It is measured on a scale of 0 (low pressures) to 10 (very high pressures).", "Source Methodology": "Gallup World Poll / Social Progress Index: Proportion answering 'yes' to whether their city is a good place for minorities.", "Definition (Source)": "", "Primary Database": "Gallup World Poll", "Source URL": "https://www.gallup.com", "Data Year (Ref)": "2023", "Brunei-Specific Comments": "Brunei score 27.66 (Rank 93). Requires policy attention for inclusivity.", "Ministry": "Ministry of Home Affairs", "Department / Agencies": "", "Policy Interventions": "Expand inclusive education, anti-discrimination awareness, and community-based initiatives that strengthen trust and equal treatment of minorities in workplaces and public services.", "Reporting Methodology": "Support stronger international survey representation for Brunei, and prepare contextual briefing materials on inclusion policies so evaluators do not rely on outdated perceptions.", "Pillar": "Attract"}, {"Indicator Code": "2.2.2", "Indicator Name": "Tolerance of immigrant", "Score": "", "Data Collection Year": "2020", "Definition": "The percentage of respondents answering \"good place\" to the question: Is the city or area where you live a good place or not a good place to live for immigrants from other countries?", "Source Methodology": "Gallup World Poll: Proportion answering 'yes' to whether their city or area is a good place for immigrants.", "Definition (Source)": "", "Primary Database": "Gallup World Poll", "Source URL": "https://www.gallup.com", "Data Year (Ref)": "2020", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Home Affairs", "Department / Agencies": "Immigration & National Registration Department", "Policy Interventions": "Promote positive integration of immigrants through public communication, fair workplace treatment, and community engagement initiatives that reduce social distance and misinformation.", "Reporting Methodology": "Seek inclusion in updated international perception surveys, and complement them with national perception data that can be shared with GTCI evaluators where formal sources are limited.", "Pillar": "Attract"}, {"Indicator Code": "2.2.3", "Indicator Name": "Social Mobility", "Score": "60.68", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent do individuals have the opportunity to improve their economic situation through their personal efforts regardless of the socioeconomic status of their parents? [1 = not at all; 7 = to a great extent].", "Source Methodology": "WEF EOS survey: 1-7 scale on individual opportunity to improve economic situation through personal efforts. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei +24.32 improvement (36.36→60.68) = MAJOR improvement in perceived opportunity", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "", "Policy Interventions": "Expand needs-based scholarships, second-chance education, targeted youth employment support, and regional development initiatives so background matters less for upward mobility.", "Reporting Methodology": "Publish policy and programme evidence on mobility-enhancing initiatives in English, and ensure informed business and civil society stakeholders are aware of these measures during survey cycles.", "Pillar": "Attract"}, {"Indicator Code": "2.2.4", "Indicator Name": "Women Economic Empowerment", "Score": "53.12", "Data Collection Year": "2024", "Definition": "The Women, Business and the Law index is a composite indicator that provides a measure of the degree of gender equality with respect to legal rights in economic participation. The index is composed of eight pillars, where each pillar represents a different aspect of a woman's life: (1) mobility, (2) workplace, (3) pay, (4) marriage, (5) parenthood, (6) entrepreneurship, (7) assets, and (8) pension. The index is measured on a scale of 0 (women have no legal economic rights equal to those of men) to 100 (women and men have equal economic opportunities).", "Source Methodology": "World Bank Women Business & Law index: 8 pillars (mobility/workplace/pay/marriage/parenthood/entrepreneurship/assets/pension). 0=no equality, 100=full equality", "Definition (Source)": "", "Primary Database": "World Bank Women, Business and the Law 2024", "Source URL": "https://wbl.worldbank.org", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "Brunei 53.12 = improved but RANK 126 (LOWEST globally). Critical gender gap", "Ministry": "Ministry of Culture, Youth and Sports / Ministry of Finance and Economy", "Department / Agencies": "", "Policy Interventions": "Prioritise legal and policy reforms in low-scoring Women, Business and the Law dimensions, and strengthen institutional support for female employment, entrepreneurship, and parenthood protections.", "Reporting Methodology": "Form an inter-agency response team to review World Bank coding, submit legislative updates quickly, and maintain a tracker of pending reforms and evidence for each WBL pillar.", "Pillar": "Attract"}, {"Indicator Code": "2.2.5", "Indicator Name": "Gender Parity High-Skilled Jobs", "Score": "82.62", "Data Collection Year": "2024", "Definition": "Gender parity in high-skilled jobs refers to the ratio of managers, professionals, or technicians and associate professionals who are female to those who are male. Possible values range from 0 (total inequality) to 1 (perfect equality). The parity index is adjusted following the methodology of UNESCO. The occupations correspond to skill levels 3 and 4 (high) in ISCO-08.", "Source Methodology": "ILO calculates: female professionals/managers : male ratio. UNESCO adjustment methodology. ISCO-08 levels 3-4", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "Brunei 82.62 = STRONG gender parity in professional roles (rank 48)", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Sustain strong gender parity in professional roles by addressing remaining sectoral gaps in STEM and leadership pipelines, supported by mentoring and inclusive HR practices.", "Reporting Methodology": "Ensure labour force and occupation statistics remain sex-disaggregated and ISCO-aligned, and transmit updated tabulations to ILOSTAT so Brunei's strengths are accurately represented.", "Pillar": "Attract"}, {"Indicator Code": "2.2.6", "Indicator Name": "Leadership opportunities for women", "Score": "71.54", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent do companies give equal opportunities to rise to positions of leadership to women? [1 = not at all; 7 = to a great extent].", "Source Methodology": "WEF EOS survey: 1-7 scale on companies giving equal leadership opportunities to women. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei +18.30 improvement (53.24→71.54) = strong progress on women leadership (rank 28)", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "", "Policy Interventions": "Encourage organisations to set leadership diversity targets, adopt transparent promotion criteria, and expand flexible work and childcare support that enables women's progression.", "Reporting Methodology": "Publicise concrete examples of women in leadership and company-level practices, and encourage informed executives to participate in WEF survey exercises.", "Pillar": "Attract"}, {"Indicator Code": "3.1.1", "Indicator Name": "Vocational Enrolment", "Score": "20.87", "Data Collection Year": "2015-2025", "Definition": "Vocational enrolment refers to the total number of students enrolled in vocational programmes in secondary education, expressed as a percentage of the total number of students enrolled in all programmes (vocational and general) at that level. The secondary level is based on ISCED 2011 levels 2–4.", "Source Methodology": "UNESCO collects % students in vocational vs general programs at secondary (ISCED 2-4). Government reporting", "Definition (Source)": "", "Primary Database": "UNESCO Institute for Statistics", "Source URL": "https://uis.unesco.org", "Data Year (Ref)": "2015-2025", "Brunei-Specific Comments": "Brunei 20.87% = LOW vocational track participation. Need more STEM/technical pathways", "Ministry": "Ministry of Education", "Department / Agencies": "Department of Planning", "Policy Interventions": "Increase attractiveness of TVET through stronger industry co-design, apprenticeships, modern equipment, and clear progression routes from vocational tracks into higher qualifications.", "Reporting Methodology": "Improve EMIS coverage of all TVET providers, align programmes to ISCED classifications, and submit updated enrolment series consistently to UNESCO UIS.", "Pillar": "Grow"}, {"Indicator Code": "3.1.2", "Indicator Name": "Tertiary Enrolment", "Score": "20.55", "Data Collection Year": "2016-2024", "Definition": "Tertiary enrolment is the ratio of total tertiary enrolment, regardless of age, to the population of the age group that officially corresponds to the tertiary level of education. The school enrolment ratio can exceed 100 percent due to grade repetition and the inclusion of under-aged and over-aged students.", "Source Methodology": "UNESCO ratio of total tertiary enrolment (all ages) to age-cohort population. Can exceed 100% due to grade repetition", "Definition (Source)": "", "Primary Database": "UNESCO Institute for Statistics / WIPO GII", "Source URL": "https://uis.unesco.org", "Data Year (Ref)": "2016-2024", "Brunei-Specific Comments": "Brunei 20.56 = RANK 85 (AMONG WORST GLOBALLY). Extreme tertiary access gap", "Ministry": "Ministry of Education", "Department / Agencies": "Higher Education Department", "Policy Interventions": "Raise tertiary participation through more flexible learning pathways, financial support, articulation agreements, and expanded programmes aligned with labour demand.", "Reporting Methodology": "Capture all recognised tertiary enrolments comprehensively, reconcile population denominators used in reporting, and clarify any structural changes that affect UNESCO series.", "Pillar": "Grow"}, {"Indicator Code": "3.1.3", "Indicator Name": "Tertiary Education Expenditure", "Score": "50.31", "Data Collection Year": "2014-2024", "Definition": "Initial government funding per tertiary student (constant PPP$) refers to the amount of resources invested by central, regional, and local governments per student enrolled at the tertiary level, divided by the constant PPP$ conversion factor. Tertiary education is based on ISCED 2011 levels 5–8.", "Source Methodology": "UNESCO: government funding per tertiary student (PPP USD). Constant prices. Official budget data", "Definition (Source)": "", "Primary Database": "UNESCO Institute for Statistics", "Source URL": "https://uis.unesco.org", "Data Year (Ref)": "2014-2024", "Brunei-Specific Comments": "Brunei RANK 6 = spends MOST per student globally. Score -35.98 likely normalization. Excellent investment", "Ministry": "Ministry of Education", "Department / Agencies": "", "Policy Interventions": "Preserve strong per-student investment while shifting toward outcome-based funding, stronger graduate tracking, and more strategic alignment of expenditure with national manpower priorities.", "Reporting Methodology": "Provide detailed expenditure breakdowns and metadata to UNESCO, including treatment of scholarships and government transfers, and verify how high spending is normalised in composite indices.", "Pillar": "Grow"}, {"Indicator Code": "3.1.4", "Indicator Name": "PISA Scores (Reading/Math/Science)", "Score": "42.06", "Data Collection Year": "2015-2022", "Definition": "PISA average scores in reading, mathematics, and science measure 15-year-olds' ability to use their reading, mathematics and science knowledge skills. The indicator is built using the average of the reading, mathematics and science scores for each country, scaled to have a mean around 500 and a standard deviation around 100.", "Source Methodology": "OECD Programme for International Student Assessment: standardized test for 15-year-olds. Mean ~500, SD ~100 across all countries tested", "Definition (Source)": "", "Primary Database": "OECD Programme for International Student Assessment 2022", "Source URL": "https://www.oecd.org/pisa", "Data Year (Ref)": "2015-2022", "Brunei-Specific Comments": "Brunei 42.06 = improved (+5.75). Foundational learning outcomes improving (rank 43)", "Ministry": "Ministry of Education", "Department / Agencies": "Department of Planning", "Policy Interventions": "Sustain curriculum and pedagogy reforms focused on literacy, numeracy, and science, with targeted support for lower-performing schools and continuous teacher development.", "Reporting Methodology": "Maintain strong technical engagement with OECD on sampling and implementation quality, and communicate national assessment improvements in English to complement PISA results.", "Pillar": "Grow"}, {"Indicator Code": "3.1.5", "Indicator Name": "University Ranking", "Score": "17.53", "Data Collection Year": "2024", "Definition": "Average score of the top three universities per country in the QS World University Rankings. If fewer than three universities are listed in the QS ranking of the global top 1,000 universities, the sum of the scores of the listed universities is divided by three, implying a score of zero for the non-listed universities.", "Source Methodology": "QS average score of top 3 universities per country in QS World University Rankings top 1,000. 0 if <3 listed", "Definition (Source)": "", "Primary Database": "QS World University Rankings 2024", "Source URL": "https://www.topuniversities.com/world-university-rankings/2024", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "Brunei -17.83 decline = reduced international competitiveness of UBD/other universities", "Ministry": "Ministry of Education", "Department / Agencies": "Higher Education Department", "Policy Interventions": "Support universities to improve research quality, international partnerships, employer reputation, and graduate outcomes, focusing on the indicator components used in QS rankings.", "Reporting Methodology": "Strengthen institutional ranking data offices, validate all submissions to QS, and ensure current data on faculty, citations, internationalisation, and reputation are supplied on time.", "Pillar": "Grow"}, {"Indicator Code": "3.2.1", "Indicator Name": "Business Masters Education", "Score": "0.0", "Data Collection Year": "2025", "Definition": "Business masters education is a composite indicator computed based on the scores of six business masters programmes, where the Global MBA is given a weight of 50%. The six pillars (weights in parentheses) are: Global MBA (50%); Business Analytics (11.25%); Finance (11.25%); Management (11.25%); Marketing (11.25%); and Supply Chain Management (5%). The value is derived from the top university per country and per programme, with countries without an institution in a programme given a value of 0 for that programme.", "Source Methodology": "QS Business Masters Rankings: composite score of 6 programs (Global MBA 50%, Analytics/Finance/Management/Marketing 11.25% each, Supply Chain 5%)", "Definition (Source)": "", "Primary Database": "QS Global MBA and Business Masters Rankings 2025", "Source URL": "https://www.topmba.com", "Data Year (Ref)": "2025", "Brunei-Specific Comments": "Brunei 0.00 = NO Brunei business school in QS top rankings. Gap in professional development", "Ministry": "Ministry of Education", "Department / Agencies": "Higher Education Department", "Policy Interventions": "Develop internationally benchmarked MBA and specialised business masters programmes, potentially through partnerships with reputable foreign institutions and strong industry relevance.", "Reporting Methodology": "Ensure eligible programmes actively submit to QS rankings and that Brunei-based institutional information, accreditation, and graduate outcomes are fully documented.", "Pillar": "Grow"}, {"Indicator Code": "3.2.2", "Indicator Name": "Prevalence of training in firms", "Score": "", "Data Collection Year": "2014-2024", "Definition": "Prevalence of training in firms refers to the percentage of firms that offered formal training programmes in the most recent complete fiscal year for their permanent, full-time employees.", "Source Methodology": "World Bank Enterprise Surveys: Percentage of firms offering formal training programs for permanent, full-time employees.", "Definition (Source)": "", "Primary Database": "World Bank Enterprise Surveys", "Source URL": "https://www.enterprisesurveys.org", "Data Year (Ref)": "2014-2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Co-fund structured firm training, especially for SMEs, and embed training expectations within sector development and investment support programmes.", "Reporting Methodology": "Insert formal training questions into enterprise surveys and coordinate with World Bank Enterprise Surveys or equivalent mechanisms so Brunei obtains an internationally recognised data point.", "Pillar": "Grow"}, {"Indicator Code": "3.2.3", "Indicator Name": "Employee Development", "Score": "62.24", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent do companies invest in workforce upskilling and reskilling? [1 = not at all; 7 = to a great extent].", "Source Methodology": "WEF EOS survey: 1-7 scale on companies investing in workforce upskilling/reskilling. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei 62.24 = moderate training investment. Room for improvement", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "", "Policy Interventions": "Launch a national workforce upskilling initiative with co-funding tied to priority skills, and encourage firms to adopt annual training plans with measurable outcomes.", "Reporting Methodology": "Compile evidence of reskilling and upskilling programmes and disseminate it through WEF-aligned channels, while encouraging informed HR leaders to respond to surveys.", "Pillar": "Grow"}, {"Indicator Code": "3.3.1", "Indicator Name": "Delegation of Authority", "Score": "65.69", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent does senior management delegate authority to subordinates? [1 = not at all; 7 = to a great extent].", "Source Methodology": "WEF EOS survey: 1-7 scale on senior management delegation. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei 65.69 = RANK 26 = strong delegation practices. Management strength", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "", "Policy Interventions": "Continue building empowerment-oriented management culture through leadership training, streamlined SOPs, and organisational redesign that pushes decision-making closer to delivery points.", "Reporting Methodology": "Showcase public and private examples of effective delegation, and encourage managers familiar with these practices to participate in relevant international surveys.", "Pillar": "Grow"}, {"Indicator Code": "3.3.2", "Indicator Name": "Youth Inclusion (NEET)", "Score": "67.31", "Data Collection Year": "2016-2025", "Definition": "Proportion of youth (aged 15–24 years) not in education, employment or training, expressed as a percentage of the population of the same age (NEET rate).", "Source Methodology": "ILO: % youth 15-24 not in education/employment/training. ILO estimates based on labour force surveys. Lower = better", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2016-2025", "Brunei-Specific Comments": "Brunei improved (less NEET 62.04→67.31 score). Better youth employment", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Strengthen programmes for NEET youth through apprenticeship, counselling, re-entry education, and job placement support with strong follow-up mechanisms.", "Reporting Methodology": "Ensure labour force surveys apply ILO-consistent NEET definitions and age bands, and report disaggregated, methodologically clear series to international databases.", "Pillar": "Grow"}, {"Indicator Code": "3.3.3", "Indicator Name": "Use of virtual social networks", "Score": "63.5", "Data Collection Year": "2024-2025", "Definition": "Social media users (%): share of the population who use social media, based on We Are Social and Hootsuite digital report estimates.", "Source Methodology": "WEF EOS survey: 1-7 scale assessing the extent of virtual social network usage in the country.", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2024-2025", "Brunei-Specific Comments": "Brunei score 63.50 (Rank 70). Moderate virtual social network utilization.", "Ministry": "Ministry of Transport and Infocommunications", "Department / Agencies": "Authority for Info-communications Technology Industry (AITI)", "Policy Interventions": "Promote productive and safe use of social networks for entrepreneurship, learning, and community engagement through digital literacy and creator-economy support.", "Reporting Methodology": "Validate international social media usage estimates against national ICT survey data and provide updated national benchmarks where possible.", "Pillar": "Grow"}, {"Indicator Code": "3.3.4", "Indicator Name": "Use of virtual professional networks", "Score": "36.47", "Data Collection Year": "2023", "Definition": "Use of virtual professional networks refers to LinkedIn's potential advertising audience as a percentage of the population aged 18 or above, based on LinkedIn's self-service advertising tools.", "Source Methodology": "LinkedIn: Digital footprint/penetration of professional networks, measured as LinkedIn users per 1,000 labor force.", "Definition (Source)": "", "Primary Database": "LinkedIn Economic Graph", "Source URL": "https://economicgraph.linkedin.com", "Data Year (Ref)": "2023", "Brunei-Specific Comments": "Brunei score 36.47 (Rank 35). Good professional networking penetration.", "Ministry": "Ministry of Transport and Infocommunications", "Department / Agencies": "Authority for Info-communications Technology Industry (AITI)", "Policy Interventions": "Encourage graduates and professionals to maintain active professional network profiles and use them for recruitment, collaboration, and skills signalling.", "Reporting Methodology": "Engage LinkedIn or similar platforms for country-level audience validation, and encourage broader adoption so the indicator better reflects professional networking penetration.", "Pillar": "Grow"}, {"Indicator Code": "4.1.1", "Indicator Name": "Pension Coverage", "Score": "100.0", "Data Collection Year": "2015-2023", "Definition": "Pension coverage refers to the share of people above statutory retirement age who receive an old-age pension, expressed as a percentage of the population above statutory retirement age.", "Source Methodology": "ILO: % population above statutory retirement age receiving old-age pension. ILO Social Security Inquiry data", "Definition (Source)": "", "Primary Database": "International Labour Organization Social Security Inquiry", "Source URL": "https://unstats.un.org/sdgs/indicatorsdatabase", "Data Year (Ref)": "2015-2023", "Brunei-Specific Comments": "Brunei 100.00 = WORLD RANK 1 = universal pension coverage. Excellent retention support", "Ministry": "Ministry of Finance and Economy / Tabung Amanah Pekerja / Ministry of Culture, Youth and Sports", "Department / Agencies": "", "Policy Interventions": "Maintain universal pension coverage while strengthening long-term sustainability through periodic actuarial review, strong fund governance, and complementary retirement savings options.", "Reporting Methodology": "Keep pension coverage data current in ILO and SDG  Poll / Lloyd's Register Foundation: Perception of being protected against future disasters.", "Definition (Source)": "", "Primary Database": "World Risk Poll", "Source URL": "https://wrp.lrfoundation.org.uk/", "Data Year (Ref)": "2023", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Home Affairs", "Department / Agencies": "National Disaster Management Centre (NDMC)", "Policy Interventions": "Expand community disaster preparedness, resilience education, and protective infrastructure so households feel more able to cope with future shocks.", "Reporting Methodology": "Seek stronger Brunei representation in World Risk Poll-type surveys and complement international polling with national preparedness perception surveys that can be shared externally.", "Pillar": "Retain"}, {"Indicator Code": "4.1.7", "Indicator Name": "Household financial resilience", "Score": "", "Data Collection Year": "2022-2024", "Definition": "Percentage of respondents who reported that their household could survive for four months or more if income was lost, in response to the question on how long the household could cover basic needs if income was lost.", "Source Methodology": "World Bank Findex: Percentage of respondents who indicate they could come up with emergency funds if needed.", "Definition (Source)": "", "Primary Database": "Global Findex Database", "Source URL": "https://www.worldbank.org/en/publication/globalfindex", "Data Year (Ref)": "2022-2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics - Household Expenditure Survey", "Policy Interventions": "Promote savings, takaful/insurance, and household financial planning through financial literacy and inclusive financial products that improve shock resilience.", "Reporting Methodology": "Integrate financial resilience questions into household and socialprogress.org", "Data Year (Ref)": "2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Prime Minister’s Office", "Department / Agencies": "", "Policy Interventions": "Maintain strong safety outcomes through targeted crime prevention, road safety enforcement, and community policing, while responding quickly to emerging risks.", "Reporting Methodology": "Ensure complete and timely reporting of crime, safety, and transport fatality statistics to international repositories that feed composite indicators.", "Pillar": "Retain"}, {"Indicator Code": "4.2.3", "Indicator Name": "Physician density", "Score": "27.37", "Data Collection Year": "2014-2022", "Definition": "Physician density refers to the number of medical doctors (physicians), including generalist and specialist medical practitioners, per 10,000 people.", "Source Methodology": "WHO: Medical doctors/physicians per 10,000 population.", "Definition (Source)": "", "Primary Database": "WHO Global Health Workforce Statistics", "Source URL": "https://apps.who.int/gho/data/", "Data Year (Ref)": "2014-2022", "Brunei-Specific Comments": "Brunei score 27.37 (Rank 77). Moderate physician density.", "Ministry": "Ministry of Health", "Department / Agencies": "", "Policy Interventions": "Expand physician supply through domestic medical training, scholarships, and targeted recruitment in shortage specialties, while improving retention of medical professionals.", "Reporting Methodology": "Update WHO workforce statistics regularly using current physician counts and verified population estimates, and ensure classifications match WHO reporting standards.", "Pillar": "Retain"}, {"Indicator Code": "4.2.4", "Indicator Name": "Sanitation", "Score": "98.0", "Data Collection Year": "2015-2021", "Definition": "Population using at least basic sanitation services (%): the percentage of the population using improved sanitation facilities that are not shared with other households, including those using safely managed sanitation services.", "Source Methodology": "WHO/UNICEF JMP: Percentage of population using at least basic sanitation services.", "Definition (Source)": "", "Primary Database": "WHO/UNICEF Joint Monitoring Programme", "Source URL": "https://washdata.org", "Data Year (Ref)": "2015-2021", "Brunei-Specific Comments": "Brunei score 98.00 (Rank 43). Excellent basic sanitation infrastructure.", "Ministry": "Ministry of Development", "Department / Agencies": "", "Policy Interventions": "Sustain high sanitation coverage and continue upgrading toward safely managed services, wastewater treatment quality, and resilience of sanitation infrastructure.", "Reporting Methodology": "Maintain high-quality JMP reporting with disaggregation by service ladder and validate that service improvements beyond basic access are captured in international databases.", "Pillar": "Retain"}, {"Indicator Code": "4.2.5", "Indicator Name": "Employee Wellbeing", "Score": "", "Data Collection Year": "2017-2024", "Definition": "Happiness score refers to the national average response to the Cantril life ladder question, where respondents rate their current life on a scale from 0 (worst possible life) to 10 (best possible life).", "Source Methodology": "Gallup World Poll: Percentage of respondents who feel their workplace supports their employee wellbeing.", "Definition (Source)": "", "Primary Database": "Gallup World Poll", "Source URL": "https://www.gallup.com", "Data Year (Ref)": "2017-2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Health / Ministry of Culture, Youth and Sports", "Department / Agencies": "", "Policy Interventions": "Encourage employers to adopt wellbeing and mental health programmes, flexible work arrangements, and healthier workplace standards supported by national guidance.", "Reporting Methodology": "Participate in or commission credible employee wellbeing surveys and share externally visible results where compatible with Gallup-style measures.", "Pillar": "Retain"}, {"Indicator Code": "5.1.1", "Indicator Name": "Workforce Secondary Education", "Score": "62.63", "Data Collection Year": "2014-2025", "Definition": "Workforce with secondary education refers to the percentage of the labour force (above 15 years old) whose highest educational attainment is at the secondary level, based on ISCED 2011 levels 3–4.", "Source Methodology": "ILO: % of employed population with at least secondary education. Based on labour force surveys + census. ISCO occupation mapping", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2014-2025", "Brunei-Specific Comments": "Brunei MAJOR -10.60 decline (73.23→62.63) = workforce education levels declining. CONCERN", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Expand second-chance and adult learning pathways for workers without completed secondary education, including modular qualifications and recognition of prior learning.", "Reporting Methodology": "Review educational attainment coding in labour force surveys, validate time-series consistency with ILOSTAT, and explain any methodological changes behind recent declines.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "5.1.2", "Indicator Name": "Population Secondary Education", "Score": "63.94", "Data Collection Year": "2014-2025", "Definition": "Population with secondary education refers to the percentage of the population (above 25 years old) whose highest educational attainment is at the secondary level, based on ISCED 2011 levels 3–4.", "Source Methodology": "ILO: % of total population (age 15+) with secondary education. New separate indicator in 2025", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2014-2025", "Brunei-Specific Comments": "Brunei 63.94% = 27th globally. Good but not excellent secondary completion", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Increase overall secondary attainment through adult completion programmes, community outreach, and targeted support for older or vulnerable cohorts.", "Reporting Methodology": "Provide harmonised attainment series for the adult population to international agencies and document reclassification issues or cohort effects that affect comparability.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "5.1.3", "Indicator Name": "Technicians & Associate Professionals", "Score": "57.06", "Data Collection Year": "2013-2025", "Definition": "Technicians and associate professionals refers to the number of technicians and associate professionals as a share of the total workforce, based on ISCO Revision 2008 (or Rev. 1988 where appropriate).", "Source Methodology": "ILO: % workforce in ISCO-08 Major Group 3 (technicians/associate professionals). Based on labour force surveys", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2013-2025", "Brunei-Specific Comments": "Brunei +6.94 improvement (50.12→57.06) = more mid-level technical jobs (rank 36)", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Grow technician and associate professional roles by aligning TVET and tertiary technical programmes with industry demand and establishing clear occupational pipelines.", "Reporting Methodology": "Ensure labour force survey occupations are coded to ISCO-08 in sufficient detail and share updated occupational distributions with international databases.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "5.1.4", "Indicator Name": "Labour Productivity per Employee", "Score": "", "Data Collection Year": "2023-2024", "Definition": "Labour productivity per person employed is obtained by dividing total output (GDP in constant PPP US dollars) by total labour input used (labour force) to produce that output.", "Source Methodology": "Conference Board: Labour productivity measured as output per worker (GDP constant 2017 PPP $ per person employed).", "Definition (Source)": "", "Primary Database": "The Conference Board, Total Economy Database", "Source URL": "https://conference-board.org/data/economydatabase", "Data Year (Ref)": "2023-2024", "Brunei-Specific Comments": "n/a - Not reported in 2025 GTCI for Brunei", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Raise labour productivity through sector upgrading, SME digitalisation, stronger management practices, and innovation support in higher value-added activities.", "Reporting Methodology": "Coordinate GDP and employment data used by international productivity databases, and reconcile any revisions so Brunei's productivity estimates are not understated.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "5.2.1", "Indicator Name": "Finding Skilled Employees", "Score": "42.88", "Data Collection Year": "2020-2025", "Definition": "Average answer to the question: In your country, to what extent can companies find people with the skills required to fill their vacancies in the local labour market? [1 = not at all; 7 = to a great extent].", "Source Methodology": "WEF EOS survey: 1-7 scale on difficulty finding skilled workers. Unweighted average. HIGHER score = MORE difficult", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei 42.88 = RANK 119 = WORLD'S atches their occupation, measured using a normative approach based on a correspondence table between occupations and required education levels (ISCED 2011 and ISCO).", "Source Methodology": "WEF EOS survey: 1-7 scale on extent of skills-education matching in labour market. Unweighted average", "Definition (Source)": "", "Primary Database": "WEF Executive Opinion Survey 2025", "Source URL": "https://reports.weforum.org", "Data Year (Ref)": "2020-2025", "Brunei-Specific Comments": "Brunei 65.70 = moderate matching but declining (-1.11). Skills-job mismatch issue", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Improve career guidance, labour market information, and reskilling pathways so workers and graduates move into roles better matched to their qualifications and capabilities.", "Reporting Methodology": "Link education and labour market datasets more effectively to measure mismatch, and publish clearer explanatory notes and evidence on matching outcomes.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "5.2.4", "Indicator Name": "Educated Unemployment", "Score": "83.21", "Data Collection Year": "2014-2024", "Definition": "Highly educated unemployment refers to the unemployment rate among the labour force with intermediate or advanced education, including upper secondary, post-secondary non-tertiary, short-cycle tertiary, bachelor's, master's and doctoral levels as defined by ISCED 2011.", "Source Methodology": "ILO: reverse metric = (1 - highly educated unemployment rate). Higher = lower unemployment of tertiary-educated. Based on labour surveys", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2014-2024", "Brunei-Specific Comments": "Brunei 83.21 = rank 48 = low unemployment of educated. Good job market for graduates", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Sustain low educated unemployment through tighter enrolment planning, stronger graduate employability support, and diversified pathways into entrepreneurship and regional opportunities.", "Reporting Methodology": "Continue reporting unemployment by education level using internationally comparable definitions, and document any survey redesigns that may affect trend interpretation.", "Pillar": "Vocational & Technical Skills"}, {"Indicator Code": "6.1.1", "Indicator Name": "Workforce with Tertiary Education", "Score": "35.56", "Data Collection Year": "2014-2025", "Definition": "Labour force with tertiary education refers to the percentage of the labour force whose highest educational attainment is at the tertiary level, based on ISCED 2011 levels 5–8.", "Source Methodology": "ILO: % of workforce with tertiary education (ISCED 2011 levels 5-8). Based on labour force surveys", "Definition (Source)": "", "Primary Database": "International Labour Organization ILOSTAT", "Source URL": "https://ilostat.ilo.org", "Data Year (Ref)": "2014-2025", "Brunei-Specific Comments": "Brunei +7.86 improvement (27.70→35.56) = more university graduates in workforce", "Ministry": "Ministry of Finance and Economy", "Department / Agencies": "Department of Economic Planning & Statistics", "Policy Interventions": "Increase tertiary-qualified workforce share through expanded flexible higher education, upskilling for adults, and attraction or return of Bruneian graduates from abroad.", "Reporting Methodology": "Ensure labour force surveys fully capture recognised tertiary qualifications aligned to ISCED 5-8 and share updated series with international agencies.", "Pillar": "Global Knowledge Skills"}, {"Indicator Code": "6.1.2", "Indicator Name": "Soft Skills", "Score": "57.13", "Data Collection Year": "2024", "Definition": "Average answer to the question: In your country, to what exte const COLUMNS = ["Indicator Code", "Indicator Name", "Score", "Data Collection Year", "Definition", "Source Methodology", "Primary Database", "Source URL", "Data Year (Ref)", "Brunei-Specific Comments", "Ministry", "Department / Agencies", "Policy Interventions", "Reporting Methodology", "Pillar"];

function init() {
  const tbody = document.getElementById('tbody');
  // Listen for realtime changes
  onValue(ref(db, 'tableData'), (snapshot) => {
    const data = snapshot.val() || RAW;
    renderTable(data);
  });
}

function updateCell(rowIdx, col, newVal) {
  // Update to Firebase
  update(ref(db, 'tableData/' + rowIdx), { [col]: newVal });
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach((row, i) => {
    const tr = document.createElement('tr');
    COLUMNS.forEach(col => {
      const td = document.createElement('td');
      td.textContent = row[col];
      td.contentEditable = true;
      td.onblur = (e) => updateCell(i, col, e.target.textContent);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

// Initialize once Firebase script loads
setTimeout(init, 2000);
</script>
